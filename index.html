<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ETH/USDT 实时 K 线</title>
    
    <!-- 引入高性能轻量级K线库 -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        /* ============ 色彩系统与重置 ============ */
        :root {
            --bg-primary: #161a1e;
            --bg-card: #1e2329;
            --text-primary: #eaecef;
            --text-secondary: #848e9c;
            --up-green: #0ecb81;
            --down-red: #f6465d;
            --yellow-gold: #f0b90b;
            --border-color: #2b3139;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            max-width: 480px; margin: 0 auto; min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; }
        .tabs { display: flex; padding: 0 16px; border-bottom: 1px solid var(--border-color); }
        .tab-item { padding: 12px 0; margin-right: 20px; font-size: 15px; color: var(--text-secondary); cursor: pointer; }
        .tab-item.active { color: var(--text-primary); font-weight: 500; border-bottom: 2px solid var(--yellow-gold); }
        
        .price-info { padding: 12px 16px; display: flex; justify-content: space-between; }
        .price-main { font-size: 28px; font-weight: 600; }
        .price-sub { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); }
        
        .timeframe-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; font-size: 13px; color: var(--text-secondary); border-bottom: 1px solid var(--border-color); }
        .tf-item { cursor: pointer; padding: 2px 0; }
        .tf-item.active { color: var(--text-primary); font-weight: 500; }
        
        .chart-container { flex: 1; display: flex; flex-direction: column; position: relative; height: 70vh;}
        .chart-box { flex: 1; width: 100%; position: relative; min-height: 250px; }
        .indicator-box { height: 100px; width: 100%; border-top: 1px solid var(--border-color); }
        .ma-legend { position: absolute; top: 4px; left: 8px; display: flex; gap: 12px; font-size: 11px; color: var(--text-secondary); pointer-events: none; z-index: 10; }
        
        .bottom-actions { display: flex; padding: 12px 16px 16px; gap: 12px; background: var(--bg-primary); border-top: 1px solid var(--border-color); align-items: center; }
        .btn { flex: 1; border: none; border-radius: 6px; color: white; font-size: 16px; font-weight: 600; padding: 12px 0; cursor: pointer; }
        .btn-buy { background: var(--up-green); }
        .btn-sell { background: var(--down-red); }
        
        /* 错误提示样式 */
        #errorToast {
            display: none; position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(246, 70, 93, 0.9); color: white; padding: 12px 20px; border-radius: 8px;
            font-size: 14px; z-index: 999; white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="errorToast">⚠️ 数据加载受限，已切换至模拟数据</div>

    <div class="header">
        <div class="header-left">← ETH/USDT <span>▼</span></div>
    </div>
    <div class="tabs">
        <div class="tab-item active">报价</div>
    </div>

    <div class="price-info">
        <div class="price-left">
            <div class="price-main" id="priceMain">加载中...</div>
        </div>
    </div>

    <div class="timeframe-bar">
        <div class="tf-items">
            <span class="tf-item" onclick="changeInterval('1m')">1分</span>
            <span class="tf-item" onclick="changeInterval('15m')">15分</span>
            <span class="tf-item active" onclick="changeInterval('1h')">1小时</span>
            <span class="tf-item" onclick="changeInterval('1d')">日线</span>
        </div>
    </div>

    <div class="chart-container">
        <div class="ma-legend"><span>MA(7): <b id="ma7">--</b></span></div>
        <div class="chart-box" id="mainChart"></div>
        <div class="indicator-box" id="volumeChart"></div>
    </div>

    <div class="bottom-actions">
        <button class="btn btn-buy">买入</button>
        <button class="btn btn-sell">卖出</button>
    </div>

    <script>
        // ================= 1. 双保险加载机制 =================
        let currentSymbol = 'ETHUSDT';
        let currentInterval = '1h';
        let chartData = [];
        let isUsingMockData = false;

        // ================= 2. 生成兜底模拟数据 (Mock Data) =================
        // 当 API 请求失败时，这个函数会生成逼真的 K 线数据确保页面不崩
        function generateMockData(count = 200) {
            let data = []; let price = 3500; let time = new Date().getTime() / 1000 - count * 3600;
            for (let i = 0; i < count; i++) {
                const change = (Math.random() - 0.5) * 100;
                const open = price; const close = price + change;
                const high = Math.max(open, close) + Math.random() * 50;
                const low = Math.min(open, close) - Math.random() * 50;
                data.push({ time: time + i * 3600, open, high, low, close, volume: Math.random() * 500 });
                price = close;
            }
            return data;
        }

        // ================= 3. 图表初始化 =================
        const mainChart = LightweightCharts.createChart(document.getElementById('mainChart'), {
            layout: { background: { color: '#161a1e' }, textColor: '#848e9c' },
            grid: { vertLines: { color: 'rgba(42, 46, 57, 0.8)' }, horzLines: { color: 'rgba(42, 46, 57, 0.8)' } },
            timeScale: { timeVisible: true }
        });
        const mainSeries = mainChart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d' });
        const maSeries = mainChart.addLineSeries({ color: '#f4b042', lineWidth: 1.5 });

        const volumeChart = LightweightCharts.createChart(document.getElementById('volumeChart'), {
            layout: { background: { color: 'transparent' }, textColor: '#848e9c' }, height: 100,
            grid: { vertLines: { color: 'transparent' }, horzLines: { color: 'rgba(42, 46, 57, 0.8)' } },
            timeScale: { visible: false }
        });
        const volumeSeries = volumeChart.addHistogramSeries({ color: '#26a69a' });

        // ================= 4. 加载数据核心逻辑 (修复了跨域与兜底) =================
        async function loadData() {
            try {
                // 1. 尝试加载 API 数据
                const url = `https://api.binance.com/api/v3/klines?symbol=${currentSymbol}&interval=${currentInterval}&limit=200`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error("API 请求失败");
                const rawData = await response.json();

                chartData = rawData.map(item => ({
                    time: Math.floor(item[0] / 1000),
                    open: parseFloat(item[1]), high: parseFloat(item[2]),
                    low: parseFloat(item[3]), close: parseFloat(item[4]),
                    volume: parseFloat(item[5])
                }));
                
                if (isUsingMockData) {
                    document.getElementById('errorToast').style.display = 'none';
                    isUsingMockData = false;
                }

            } catch (error) {
                // 2. 如果加载失败，使用兜底数据，并提示用户
                console.warn("真实数据加载失败，启动模拟数据:", error);
                if (!isUsingMockData) {
                    document.getElementById('errorToast').style.display = 'block';
                    setTimeout(() => document.getElementById('errorToast').style.display = 'none', 4000);
                    isUsingMockData = true;
                }
                chartData = generateMockData();
            }

            // 3. 渲染图表
            renderChart();
        }

        function renderChart() {
            if (chartData.length === 0) return;
            mainSeries.setData(chartData);
            
            const volData = chartData.map(i => ({ time: i.time, value: i.volume, color: i.close > i.open ? '#0ecb81' : '#f6465d' }));
            volumeSeries.setData(volData);

            // 计算简单均线
            const ma7 = chartData.map((item, i) => {
                if (i < 6) return null;
                let sum = 0; for(let j=i-6; j<=i; j++) sum += chartData[j].close;
                return { time: item.time, value: sum / 7 };
            }).filter(i => i !== null);
            maSeries.setData(ma7);
            
            document.getElementById('ma7').innerText = ma7.length > 0 ? ma7[ma7.length-1].value.toFixed(2) : '--';
            document.getElementById('priceMain').innerText = chartData[chartData.length-1].close.toFixed(2);
        }

        // ================= 5. 切换周期 =================
        function changeInterval(interval) {
            currentInterval = interval;
            document.querySelectorAll('.tf-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            loadData(); // 重新加载
        }

        // ================= 6. 启动 =================
        loadData();
        // 每 30 秒刷新一次最新数据
        setInterval(loadData, 30000);
        window.addEventListener('resize', () => mainChart.resize(document.getElementById('mainChart').clientWidth, document.getElementById('mainChart').clientHeight));

    </script>
</body>
</html>
