<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYK 生态操作面板</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #e94560; margin-bottom: 20px; font-size: 24px; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #0f3460; }
        .card h2 { font-size: 18px; margin-bottom: 12px; color: #e94560; }
        input { width: 100%; padding: 12px; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: #fff; font-size: 16px; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: #e94560; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #c73652; }
        button:disabled { background: #555; cursor: not-allowed; }
        .info { background: #0f3460; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 14px; word-break: break-all; }
        .success { color: #4ecca3; }
        .error { color: #e94560; }
        .address-bar { background: #16213e; padding: 12px; border-radius: 8px; margin-bottom: 16px; text-align: center; font-size: 14px; border: 1px solid #0f3460; }
        .address-bar span { color: #4ecca3; }

        /* 滑动模块 */
        .slider-container { position: relative; overflow: hidden; }
        .slider-wrapper { display: flex; transition: transform 0.3s ease; }
        .slider-item { min-width: 100%; padding: 10px; }
        .slider-nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .slider-dot { width: 10px; height: 10px; border-radius: 50%; background: #0f3460; cursor: pointer; }
        .slider-dot.active { background: #e94560; width: 24px; border-radius: 5px; }
        .slider-arrows { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .slider-arrows button { width: 40px; height: 30px; padding: 0; font-size: 18px; background: #0f3460; }
        .tag { display: inline-block; background: #e94560; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 MYK 生态操作面板</h1>
        
        <!-- 钱包地址 -->
        <div class="address-bar">
            钱包：<span id="walletAddr">未连接</span>
            <br><button onclick="connectWallet()" style="margin-top:8px; padding:8px;">连接钱包</button>
        </div>

        <!-- ==================== 模块1：激活身份（左右滑动） ==================== -->
        <div class="card">
            <h2>🎯 激活身份 <span style="font-size:12px;color:#888;">← 左右滑动 →</span></h2>
            <div class="slider-arrows">
                <button onclick="slideActivate(-1)">◀</button>
                <span id="activateTitle" style="font-size:14px;">支付2U激活</span>
                <button onclick="slideActivate(1)">▶</button>
            </div>
            <div class="slider-container">
                <div class="slider-wrapper" id="activateSlider">
                    <!-- 页1：支付2U激活 -->
                    <div class="slider-item">
                        <p style="font-size:13px;color:#888;margin-bottom:8px;">支付2 USDT等值MYK自动获取 <b>初级做市商身份（1.2%日奖币）</b></p>
                        <input id="activateMYKAmount" type="number" placeholder="MYK数量（≥2 USDT等值）" value="10">
                        <button id="btnActivateMYK" onclick="activateByMYK()">转账并激活</button>
                        <div id="activateMYKResult" class="info" style="display:none;"></div>
                    </div>
                    <!-- 页2：认购200U激活 -->
                    <div class="slider-item">
                        <p style="font-size:13px;color:#888;margin-bottom:8px;">认购200 USDT等值MYK自动获取 <b>社区节点（2%日收益）</b></p>
                        <input id="subscribe200Amount" type="number" placeholder="USDT数量（200）" value="200">
                        <button id="btnSubscribe200" onclick="subscribeAndActivate(200)">认购并激活</button>
                        <div id="subscribe200Result" class="info" style="display:none;"></div>
                    </div>
                    <!-- 页3：认购500U激活 -->
                    <div class="slider-item">
                        <p style="font-size:13px;color:#888;margin-bottom:8px;">认购500 USDT自动获取 <b>第四社区身份（2.5%日奖币，享受四成社区奖励）</b></p>
                        <input id="subscribe500Amount" type="number" placeholder="USDT数量（500）" value="500">
                        <button id="btnSubscribe500" onclick="subscribeAndActivate(500)">认购并激活</button>
                        <div id="subscribe500Result" class="info" style="display:none;"></div>
                    </div>
                    <!-- 页4：认购1000U激活 -->
                    <div class="slider-item">
                        <p style="font-size:13px;color:#888;margin-bottom:8px;">认购1000 USDT自动获取 <b>第五社区身份（2.5%日奖币，享受五成社区奖励）</b></p>
                        <input id="subscribe1000Amount" type="number" placeholder="USDT数量（1000）" value="1000">
                        <button id="btnSubscribe1000" onclick="subscribeAndActivate(1000)">认购并激活</button>
                        <div id="subscribe1000Result" class="info" style="display:none;"></div>
                    </div>
                </div>
            </div>
            <div class="slider-nav" id="activateDots">
                <div class="slider-dot active" onclick="goToActivate(0)"></div>
                <div class="slider-dot" onclick="goToActivate(1)"></div>
                <div class="slider-dot" onclick="goToActivate(2)"></div>
                <div class="slider-dot" onclick="goToActivate(3)"></div>
            </div>
        </div>

        <!-- 查看身份状态 -->
        <div class="card">
            <h2>🔍 查看身份状态</h2>
            <input id="checkAddr" type="text" placeholder="钱包地址（留空查自己）">
            <button onclick="checkStatus()">查询</button>
            <div id="statusResult" class="info" style="display:none;"></div>
        </div>

        <!-- MYK余额 -->
        <div class="card">
            <h2>📊 MYK余额</h2>
            <button onclick="checkMYKBalance()">查询余额</button>
            <div id="balanceResult" class="info" style="display:none;"></div>
        </div>
    </div>

    <script>
        // ==================== 合约地址 ====================
        const MYK_ADDR = '0x4f08eb649A9BbC047cfAe4C9dcE050BBdfE857d1';
        const REWARD_POOL_ADDR = '0xE657505E4397a143d4c4810b03EB408D02D5d33d';
        const LOCKER_ADDR = '0xa69c5F9952C2a917C744dCBbde47b394f6E7D765';
        const USDT_ADDR = '0x55d398326f99059fF775485246999027B3197955';

        let web3, userAddress;
        let activateIndex = 0;
        const activateTitles = ['支付2U激活', '认购200U激活', '认购500U激活', '认购1000U激活'];

        // ==================== 连接钱包 ====================
        async function connectWallet() {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    web3 = new Web3(window.ethereum);
                    const accounts = await web3.eth.getAccounts();
                    userAddress = accounts[0];
                    document.getElementById('walletAddr').innerHTML = userAddress.slice(0,6)+'...'+userAddress.slice(-4);
                    document.getElementById('checkAddr').value = userAddress;
                } catch (e) {
                    alert('请安装MetaMask或TP钱包');
                }
            } else {
                alert('请安装MetaMask或TP钱包');
            }
        }

        // ==================== 滑动模块 ====================
        function slideActivate(dir) {
            activateIndex = Math.max(0, Math.min(3, activateIndex + dir));
            updateActivateSlider();
        }

        function goToActivate(idx) {
            activateIndex = idx;
            updateActivateSlider();
        }

        function updateActivateSlider() {
            document.getElementById('activateSlider').style.transform = `translateX(-${activateIndex * 100}%)`;
            document.getElementById('activateTitle').textContent = activateTitles[activateIndex];
            document.querySelectorAll('#activateDots .slider-dot').forEach((d, i) => d.classList.toggle('active', i === activateIndex));
        }

        // ==================== 支付2U MYK激活 ====================
        async function activateByMYK() {
            if (!userAddress) return alert('请先连接钱包');
            const btn = document.getElementById('btnActivateMYK');
            const result = document.getElementById('activateMYKResult');
            btn.disabled = true; btn.textContent = '处理中...';
            result.style.display = 'block'; result.innerHTML = '⏳ 正在转账MYK...';
            try {
                const amount = document.getElementById('activateMYKAmount').value;
                const erc20ABI = [{ "constant": false, "inputs": [{ "name": "_to", "type": "address" }, { "name": "_value", "type": "uint256" }], "name": "transfer", "outputs": [{ "name": "", "type": "bool" }], "type": "function" }];
                const mykContract = new web3.eth.Contract(erc20ABI, MYK_ADDR);
                await mykContract.methods.transfer(REWARD_POOL_ADDR, web3.utils.toWei(amount, 'ether')).send({ from: userAddress });
                result.innerHTML = '<span class="success">✅ 激活成功！初级做市商身份（1.2%日奖币）</span>';
            } catch (e) {
                result.innerHTML = '<span class="error">❌ 失败：' + (e.message || '未知错误').slice(0, 200) + '</span>';
            }
            btn.disabled = false; btn.textContent = '转账并激活';
        }

        // ==================== 认购USDT激活 ====================
        async function subscribeAndActivate(usdtAmountNum) {
            if (!userAddress) return alert('请先连接钱包');
            const resultId = 'subscribe' + usdtAmountNum + 'Result';
            const btnId = 'btnSubscribe' + usdtAmountNum;
            const btn = document.getElementById(btnId);
            const result = document.getElementById(resultId);
            btn.disabled = true; btn.textContent = '处理中...';
            result.style.display = 'block'; result.innerHTML = '⏳ 正在授权USDT...';
            try {
                const usdtAmount = web3.utils.toWei(String(usdtAmountNum), 'ether');

                // 1. 授权USDT
                const usdtABI = [{ "constant": false, "inputs": [{ "name": "_spender", "type": "address" }, { "name": "_value", "type": "uint256" }], "name": "approve", "outputs": [{ "name": "", "type": "bool" }], "type": "function" }];
                const usdtContract = new web3.eth.Contract(usdtABI, USDT_ADDR);
                await usdtContract.methods.approve(LOCKER_ADDR, usdtAmount).send({ from: userAddress });

                result.innerHTML = '⏳ 正在认购MYK并锁仓...';

                // 2. 认购MYK
                const lockerABI = [{ "inputs": [{ "internalType": "uint256", "name": "usdtAmount", "type": "uint256" }], "name": "subscribeMYK", "outputs": [], "stateMutability": "nonpayable", "type": "function" }];
                const lockerContract = new web3.eth.Contract(lockerABI, LOCKER_ADDR);
                await lockerContract.methods.subscribeMYK(usdtAmount).send({ from: userAddress });

                const labels = { 200: '社区节点（2%日收益）', 500: '第四社区身份（2.5%日奖币，享受四成社区奖励）', 1000: '第五社区身份（2.5%日奖币，享受五成社区奖励）' };
                result.innerHTML = '<span class="success">✅ 认购成功！已获得' + labels[usdtAmountNum] + '</span>';
            } catch (e) {
                result.innerHTML = '<span class="error">❌ 失败：' + (e.message || '未知错误').slice(0, 200) + '</span>';
            }
            btn.disabled = false; btn.textContent = '认购并激活';
        }

        // ==================== 查看身份状态 ====================
        async function checkStatus() {
            const addr = document.getElementById('checkAddr').value || userAddress;
            if (!addr) return alert('请输入地址');
            const result = document.getElementById('statusResult');
            result.style.display = 'block'; result.innerHTML = '⏳ 查询中...';
            try {
                const abi = [{ "inputs": [{ "internalType": "address", "name": "", "type": "address" }], "name": "users", "outputs": [
                    { "internalType": "address", "name": "referrer", "type": "address" },
                    { "internalType": "uint96", "name": "invited", "type": "uint96" },
                    { "internalType": "uint96", "name": "todayBuy", "type": "uint96" },
                    { "internalType": "uint96", "name": "todayReward", "type": "uint96" },
                    { "internalType": "uint40", "name": "activatedAt", "type": "uint40" },
                    { "internalType": "uint40", "name": "lastRewardDay", "type": "uint40" },
                    { "internalType": "uint40", "name": "lastClaim", "type": "uint40" },
                    { "internalType": "uint8", "name": "role", "type": "uint8" },
                    { "internalType": "bool", "name": "isActive", "type": "bool" }
                ], "stateMutability": "view", "type": "function" }];
                const contract = new web3.eth.Contract(abi, REWARD_POOL_ADDR);
                const user = await contract.methods.users(addr).call();
                const roleNames = ['无', 'PRIMARY', 'MIDDLE', 'COMMUNITY'];
                result.innerHTML = `
                    <b>身份：</b>${roleNames[user.role]}<br>
                    <b>激活：</b>${user.isActive ? '✅ 已激活' : '❌ 未激活'}<br>
                    <b>推荐人：</b>${user.referrer === '0x0000000000000000000000000000000000000000' ? '无' : user.referrer.slice(0,6)+'...'}<br>
                    <b>已邀请：</b>${user.invited}人<br>
                    <b>激活时间：</b>${user.activatedAt > 0 ? new Date(user.activatedAt*1000).toLocaleString() : '未激活'}
                `;
            } catch (e) {
                result.innerHTML = '<span class="error">❌ 查询失败</span>';
            }
        }

        // ==================== 查看MYK余额 ====================
        async function checkMYKBalance() {
            if (!userAddress) return alert('请先连接钱包');
            const result = document.getElementById('balanceResult');
            result.style.display = 'block'; result.innerHTML = '⏳ 查询中...';
            try {
                const abi = [{ "constant": true, "inputs": [{ "name": "_owner", "type": "address" }], "name": "balanceOf", "outputs": [{ "name": "balance", "type": "uint256" }], "type": "function" }];
                const contract = new web3.eth.Contract(abi, MYK_ADDR);
                const balance = await contract.methods.balanceOf(userAddress).call();
                result.innerHTML = `<b>MYK余额：</b>${web3.utils.fromWei(balance, 'ether')} MYK`;
            } catch (e) {
                result.innerHTML = '<span class="error">❌ 查询失败</span>';
            }
        }

        window.onload = () => { if (window.ethereum) connectWallet(); };
    </script>
</body>
</html>
