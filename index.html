<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>去中心化 OTC 端到端加密通信测试</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f111a; color: #e0e0e0; 
            max-width: 800px; margin: 20px auto; padding: 0 20px;
        }
        h1 { text-align: center; color: #f0b90b; border-bottom: 1px solid #2b3139; padding-bottom: 10px; }
        .container { display: flex; flex-direction: column; gap: 20px; }
        
        .key-box { 
            background: #1e2329; padding: 15px; border-radius: 8px; border: 1px solid #2b3139;
            word-break: break-all;
        }
        .key-label { color: #848e9c; font-size: 0.9em; margin-bottom: 5px; display: block; }
        .key-content { font-family: monospace; font-size: 12px; color: #eaecef; }

        .chat-box { 
            background: #161a1e; border: 1px solid #2b3139; border-radius: 8px; 
            height: 300px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;
        }
        .message { padding: 8px 12px; border-radius: 12px; max-width: 70%; line-height: 1.4; }
        .msg-sender { align-self: flex-end; background: #0ecb81; color: #000; }
        .msg-receiver { align-self: flex-start; background: #2b3139; color: #fff; }
        .msg-meta { font-size: 10px; color: #848e9c; margin-top: 2px; text-align: right; }

        .controls { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #2b3139; background: #1e2329; color: #eaecef; outline: none; }
        input:focus { border-color: #f0b90b; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #f0b90b; color: #0f111a; }
        .btn-primary:hover { background: #d4a20a; }
        .btn-danger { background: #f6465d; color: white; }

        .status { text-align: center; font-size: 14px; color: #848e9c; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔐 OTC 加密通信原型 (E2EE)</h1>
        
        <div class="key-box">
            <span class="key-label">🔑 买家公钥 (发送者)</span>
            <div class="key-content" id="pubKeySender">生成中...</div>
        </div>
        <div class="key-box">
            <span class="key-label">🔑 卖家公钥 (接收者)</span>
            <div class="key-content" id="pubKeyReceiver">生成中...</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div style="color:#848e9c; text-align:center;">系统：加密通道已建立，请开始安全通信。</div>
        </div>

        <div class="controls">
            <input type="text" id="messageInput" placeholder="输入秘密信息 (如: 银行尾号 8888)" />
            <button class="btn-primary" onclick="sendEncryptedMessage()">发送 (加密)</button>
            <button class="btn-danger" onclick="clearChat()">清空记录</button>
        </div>
        <div class="status" id="statusMsg">等待发送消息...</div>
    </div>

    <script>
        // ================= 1. 密钥生成 (RSA-OAEP) =================
        let senderKeyPair, receiverKeyPair;
        let receiverPublicKeyExported;

        // 生成 RSA 密钥对 (浏览器原生支持)
        async function generateKeys() {
            try {
                // 生成发送方密钥
                senderKeyPair = await crypto.subtle.generateKey(
                    { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                    true,
                    ["encrypt", "decrypt"]
                );
                // 生成接收方密钥
                receiverKeyPair = await crypto.subtle.generateKey(
                    { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                    true,
                    ["encrypt", "decrypt"]
                );

                // 导出公钥供展示和加密使用
                const senderPub = await crypto.subtle.exportKey("spki", senderKeyPair.publicKey);
                const receiverPub = await crypto.subtle.exportKey("spki", receiverKeyPair.publicKey);

                document.getElementById('pubKeySender').innerText = arrayBufferToBase64(senderPub).substring(0, 60) + "...";
                document.getElementById('pubKeyReceiver').innerText = arrayBufferToBase64(receiverPub).substring(0, 60) + "...";

                // 存储接收方公钥用于加密信息 (模拟发消息给卖家)
                receiverPublicKeyExported = receiverKeyPair.publicKey;
                
                console.log("🔑 密钥生成成功");
            } catch (e) {
                console.error("密钥生成失败:", e);
                alert("您的浏览器可能不支持 Web Crypto API 或处于非安全环境（需 HTTPS 或 localhost）");
            }
        }

        // ================= 2. 加密与解密逻辑 =================
        // ArrayBuffer 转 Base64 (用于存储传输)
        function arrayBufferToBase64(buffer) {
            const binary = String.fromCharCode(...new Uint8Array(buffer));
            return btoa(binary);
        }
        // Base64 转 ArrayBuffer
        function base64ToArrayBuffer(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return bytes.buffer;
        }

        // 加密消息 (使用接收者的公钥加密)
        async function encryptMessage(text, publicKey) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const encrypted = await crypto.subtle.encrypt(
                { name: "RSA-OAEP" },
                publicKey,
                data
            );
            return arrayBufferToBase64(encrypted);
        }

        // 解密消息 (使用接收者的私钥解密)
        async function decryptMessage(encryptedBase64, privateKey) {
            const encryptedData = base64ToArrayBuffer(encryptedBase64);
            const decrypted = await crypto.subtle.decrypt(
                { name: "RSA-OAEP" },
                privateKey,
                encryptedData
            );
            const decoder = new TextDecoder();
            return decoder.decode(decrypted);
        }

        // ================= 3. 聊天交互逻辑 =================
        async function sendEncryptedMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById('chatBox');
            const status = document.getElementById('statusMsg');

            try {
                status.innerText = "⏳ 正在加密消息...";

                // 1. 加密消息 (模拟买家发给卖家，使用卖家的公钥)
                const encryptedMsg = await encryptMessage(msg, receiverPublicKeyExported);

                status.innerText = `✅ 消息已加密 (密文长度: ${encryptedMsg.length} 字符)`;

                // 2. 在 UI 展示加密后的传输数据 (模拟网络传输过程)
                const senderDiv = document.createElement('div');
                senderDiv.className = 'message msg-sender';
                senderDiv.innerHTML = `
                    <div>📤 [加密传输中]</div>
                    <div style="font-size: 10px; color: #555; word-break: break-all;">密文: ${encryptedMsg.substring(0, 30)}...</div>
                `;
                chatBox.appendChild(senderDiv);

                // 3. 模拟网络延迟，然后接收端解密
                setTimeout(async () => {
                    status.innerText = "🔓 接收者正在解密...";
                    
                    // 卖家收到密文，用自己的私钥解密 (模拟卖家收到消息)
                    const decryptedMsg = await decryptMessage(encryptedMsg, receiverKeyPair.privateKey);

                    // 展示解密后的明文 (只有卖家能看到)
                    const receiverDiv = document.createElement('div');
                    receiverDiv.className = 'message msg-receiver';
                    receiverDiv.innerHTML = `
                        <div>📥 [解密成功]</div>
                        <div style="font-weight: bold; font-size: 16px;">${decryptedMsg}</div>
                        <div class="msg-meta">卖家已读取 (端到端加密)</div>
                    `;
                    chatBox.appendChild(receiverDiv);
                    
                    status.innerText = "💬 通信安全，已保护隐私。";
                    chatBox.scrollTop = chatBox.scrollHeight;
                }, 1500); // 模拟 1.5 秒网络延迟

                input.value = '';
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (e) {
                console.error(e);
                status.innerText = "❌ 加密失败: " + e.message;
            }
        }

        function clearChat() {
            document.getElementById('chatBox').innerHTML = `
                <div style="color:#848e9c; text-align:center;">系统：加密通道已重置。</div>
            `;
            document.getElementById('statusMsg').innerText = "聊天记录已清除";
        }

        // ================= 4. 初始化 =================
        window.onload = function() {
            // 注意：Web Crypto API 在本地 file:// 协议下会被浏览器安全策略拦截！
            // 必须通过 http://localhost 或 https:// 打开才能运行加密逻辑。
            if (window.location.protocol === 'file:') {
                document.getElementById('statusMsg').innerText = "⚠️ 安全警告：请使用本地服务器 (如 Live Server) 打开此页面，否则加密功能将被浏览器阻止。";
            } else {
                generateKeys();
            }
        };
    </script>
</body>
</html>
